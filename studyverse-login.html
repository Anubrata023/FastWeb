  filter: brightness(0.38) saturate(0.7);
}
@keyframes bgZoom { from{transform:scale(1);} to{transform:scale(1.06);} }

.bg-overlay {
  position: fixed; inset: 0; z-index: 1;
  background: linear-gradient(
    135deg,
    rgba(5,5,12,0.78) 0%,
    rgba(18,12,28,0.62) 40%,
    rgba(240,84,84,0.02) 100%
  );
}

/* Rain particles */
.rain {
  position: fixed; inset: 0; z-index: 2;
  pointer-events: none;
  overflow: hidden;
}
.drop {
  position: absolute;
  width: 1px;
  background: linear-gradient(to bottom, transparent, rgba(180,210,255,0.28));
  animation: fall linear infinite;
  top: -120px;
}
@keyframes fall { to { transform: translateY(110vh) translateX(-30px); } }

/* WRAPPER */
.page {
  position: relative; z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%; height: 100%;
  padding: 20px;
}

/* CARD */
.card {
  width: 100%;
  max-width: 420px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 28px;
  padding: 44px 40px 36px;
  backdrop-filter: blur(28px) saturate(1.4);
  -webkit-backdrop-filter: blur(28px) saturate(1.4);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04) inset,
    0 40px 80px rgba(0,0,0,0.55),
    0 0 20px rgba(240,84,84,0.02);
  animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cardIn {
  from { opacity:0; transform: translateY(28px) scale(0.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

/* LOGO */
.logo {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 6px;
}
.logo-icon {
  width: 40px; height: 40px; border-radius: 12px;
  background: linear-gradient(135deg, var(--red), #c03030);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  box-shadow: 0 2px 8px rgba(240,84,84,0.12);
  flex-shrink: 0;
}
.logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem; font-weight: 900;
  color: var(--cream);
  letter-spacing: -0.02em;
}
.logo-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--red);
  display: inline-block; margin-left: 2px;
  animation: blink 2s ease-in-out infinite;
  vertical-align: middle;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.25;} }

.tagline {
  font-size: 0.78rem; color: rgba(245,245,245,0.38);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 32px;
}

/* TABS */
.tabs {
  display: flex; gap: 0;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 28px;
  border: 1px solid rgba(255,255,255,0.06);
}
.tab-btn {
  flex: 1; padding: 9px 0;
  border: none; background: none;
  border-radius: 9px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.83rem; font-weight: 600;
  color: rgba(245,245,245,0.38);
  cursor: pointer;
  transition: all 0.22s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.tab-btn.active {
  background: linear-gradient(135deg, var(--red), #c83030);
  color: white;
  box-shadow: 0 2px 8px rgba(240,84,84,0.12);
}

/* FORMS */
.form { display: none; }
.form.active { display: block; }

.field {
  margin-bottom: 16px;
}
.field label {
  display: block;
  font-size: 0.72rem; font-weight: 600;
  color: rgba(245,245,245,0.45);
  letter-spacing: 0.1em; text-transform: uppercase;
  font-family: 'DM Mono', monospace;
  margin-bottom: 7px;
}
.field-wrap {
  position: relative;
}
.field-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  font-size: 1rem; opacity: 0.4;
  pointer-events: none;
}
.field input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 12px 14px 12px 40px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem; color: var(--cream);
  outline: none;
  transition: all 0.22s;
}
.field input::placeholder { color: rgba(245,245,245,0.22); }
.field input:focus {
  border-color: var(--red);
  background: rgba(240,84,84,0.06);
  box-shadow: 0 0 0 2px rgba(196,68,68,0.08);
}

/* Phone row */
.phone-row { display: flex; gap: 10px; }
.country-sel {
  flex-shrink: 0;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 12px 10px;
  font-family: 'DM Mono', monospace;
  font-size: 0.82rem; color: var(--cream);
  outline: none;
  cursor: pointer;
  transition: all 0.22s;
}
.country-sel:focus { border-color: var(--red); box-shadow: 0 0 0 2px rgba(196,68,68,0.08); }
.country-sel option { background: #1a1a2e; color: var(--cream); }

/* OTP */
.otp-hint {
  font-size: 0.73rem; color: rgba(245,245,245,0.32);
  margin-bottom: 14px; line-height: 1.5;
  font-family: 'DM Mono', monospace;
}
.otp-boxes {
  display: flex; gap: 10px; margin-bottom: 16px;
}
.otp-input {
  flex: 1; text-align: center;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 14px 0;
  font-size: 1.2rem; font-weight: 700;
  color: var(--cream);
  font-family: 'DM Mono', monospace;
  outline: none;
  transition: all 0.22s;
  width: 0;
}
.otp-input:focus { border-color: var(--red); background: rgba(240,84,84,0.08); box-shadow: 0 0 0 2px rgba(196,68,68,0.08); }

/* FORGOT */
.forgot {
  text-align: right; margin-top: -6px; margin-bottom: 16px;
}
.forgot a {
  font-size: 0.74rem; color: rgba(240,84,84,0.7);
  text-decoration: none; transition: color 0.2s;
}
.forgot a:hover { color: var(--red); }

/* SEND OTP BTN */
.send-otp {
  width: 100%; padding: 8px 0;
  background: none;
  border: 1px dashed rgba(240,84,84,0.35);
  border-radius: 10px;
  color: rgba(240,84,84,0.7);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem; font-weight: 600;
  cursor: pointer; margin-bottom: 16px;
  transition: all 0.22s;
  letter-spacing: 0.04em;
}
.send-otp:hover { background: rgba(240,84,84,0.07); color: var(--red); border-color: var(--red); }
.send-otp:disabled { opacity: 0.4; cursor: not-allowed; }

/* SUBMIT */
.submit-btn {
  width: 100%; padding: 14px 0;
  background: linear-gradient(135deg, var(--red) 0%, #c83030 100%);
  border: none; border-radius: 14px;
  font-family: 'Playfair Display', serif;
  font-size: 1rem; font-weight: 700;
  color: white; cursor: pointer;
  letter-spacing: 0.02em;
  box-shadow: 0 3px 12px rgba(240,84,84,0.15);
  transition: all 0.25s;
  position: relative; overflow: hidden;
  margin-top: 4px;
}
.submit-btn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
  opacity: 0; transition: opacity 0.25s;
}
.submit-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 16px rgba(240,84,84,0.2); }
.submit-btn:hover::after { opacity: 1; }
.submit-btn:active { transform: translateY(0); }

/* DIVIDER */
.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0;
  font-size: 0.7rem; color: rgba(245,245,245,0.2);
  font-family: 'DM Mono', monospace; letter-spacing: 0.1em;
}
.divider::before, .divider::after {
  content: ''; flex: 1;
  height: 1px; background: rgba(255,255,255,0.07);
}

/* GOOGLE */
.google-btn {
  width: 100%; padding: 12px 0;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem; font-weight: 600;
  color: rgba(245,245,245,0.7); cursor: pointer;
  transition: all 0.22s;
}
.google-btn:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.2); color: var(--cream); }
.google-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

/* FOOTER */
.card-foot {
  text-align: center; margin-top: 22px;
  font-size: 0.76rem; color: rgba(245,245,245,0.28);
}
.card-foot a { color: rgba(240,84,84,0.75); text-decoration: none; transition: color 0.2s; }
.card-foot a:hover { color: var(--red); }

/* STREAK BADGE */
.streak {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(240,84,84,0.1);
  border: 1px solid rgba(240,84,84,0.2);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 0.68rem; font-weight: 600;
  color: rgba(240,84,84,0.8);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.08em;
  margin-bottom: 18px;
}

/* SUCCESS STATE */
.success-card {
  display: none; text-align: center;
}
.success-card.show { display: block; }
.success-icon {
  width: 70px; height: 70px; border-radius: 50%;
  background: linear-gradient(135deg, var(--red), #c83030);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem; margin: 0 auto 20px;
  box-shadow: 0 0 14px rgba(240,84,84,0.15);
  animation: popIn 0.5s cubic-bezier(0.22,1,0.36,1);
}
@keyframes popIn { from{transform:scale(0.5);opacity:0;} to{transform:scale(1);opacity:1;} }

/* TOAST */
.toast-stack { position:fixed; bottom:28px; right:28px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
.toast {
  display:flex; align-items:center; gap:10px;
  background:rgba(18,18,30,0.94);
  border:1px solid rgba(240,84,84,0.25);
  border-radius:14px; padding:12px 18px;
  font-size:0.82rem; color:var(--cream);
  backdrop-filter:blur(12px);
  animation:slideUp 0.35s cubic-bezier(0.22,1,0.36,1);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
@keyframes slideUp { from{opacity:0;transform:translateY(20px);} }
.toast-i { font-size:1.1rem; }

/* LOADER */
.btn-loading { opacity:0.7; pointer-events:none; }
.spinner {
  display:inline-block; width:16px; height:16px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:white; border-radius:50%;
  animation:spin 0.7s linear infinite; margin-right:6px;
  vertical-align:middle;

<div class="bg" id="bgEl"></div>
<div class="bg-overlay"></div>
<div class="rain" id="rain"></div>

<div class="page">
  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">📚</div>
      <span class="logo-text">StudyVerse<span class="logo-dot"></span></span>
    </div>
    <div class="tagline">Your ultimate study companion</div>

    <div class="streak">🔥 18-day streak · Join 2M+ learners</div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" id="tabEmail" onclick="switchTab('email')">✉️ Gmail</button>
      <button class="tab-btn" id="tabPhone" onclick="switchTab('phone')">📱 Phone</button>
    </div>

    <!-- EMAIL FORM -->
    <div class="form active" id="formEmail">
      <div class="field">
        <label>Gmail Address</label>
        <div class="field-wrap">
          <span class="field-icon">✉️</span>
          <input type="email" id="emailInp" placeholder="yourname@gmail.com" autocomplete="email">
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="field-wrap">
          <span class="field-icon">🔒</span>
          <input type="password" id="passInp" placeholder="Enter your password">
        </div>
      </div>
      <div class="forgot"><a href="#">Forgot password?</a></div>
      <button class="submit-btn" onclick="loginEmail()">Sign In to StudyVerse</button>

      <div class="divider">or continue with</div>

      <button class="google-btn" onclick="loginGoogle()">

        </svg>
        Continue with Google
      </button>
    </div>

    <!-- PHONE FORM -->
    <div class="form" id="formPhone">
      <div class="field" id="phoneStep1">
        <label>Mobile Number</label>
        <div class="phone-row">
          <select class="country-sel" id="dialCode">
            <option value="+91">🇮🇳 +91</option>
            <option value="+1">🇺🇸 +1</option>
            <option value="+44">🇬🇧 +44</option>
            <option value="+61">🇦🇺 +61</option>
            <option value="+971">🇦🇪 +971</option>
            <option value="+65">🇸🇬 +65</option>
          </select>
          <div class="field-wrap" style="flex:1">
            <span class="field-icon">📱</span>
            <input type="tel" id="phoneInp" placeholder="Enter phone number" maxlength="10">
          </div>
        </div>
      </div>

      <!-- OTP section (hidden initially) -->
      <div id="otpSection" style="display:none">
        <div class="otp-hint">Enter the 6-digit OTP sent to <span id="otpTarget" style="color:var(--red)"></span></div>
        <div class="otp-boxes">
          <input type="text" class="otp-input" maxlength="1" oninput="otpNext(this,0)">
          <input type="text" class="otp-input" maxlength="1" oninput="otpNext(this,1)">
          <input type="text" class="otp-input" maxlength="1" oninput="otpNext(this,2)">
          <input type="text" class="otp-input" maxlength="1" oninput="otpNext(this,3)">
          <input type="text" class="otp-input" maxlength="1" oninput="otpNext(this,4)">
          <input type="text" class="otp-input" maxlength="1" oninput="otpNext(this,5)">
        </div>
        <p style="font-size:0.73rem;color:rgba(245,245,245,0.3);text-align:center;margin-bottom:16px;">
          Didn't get OTP? <a href="#" onclick="resendOtp()" style="color:rgba(240,84,84,0.7);text-decoration:none" id="resendLink">Resend in <span id="resendTimer">30</span>s</a>
        </p>
        <button class="submit-btn" onclick="verifyOtp()">Verify & Enter StudyVerse</button>
      </div>

      <button class="send-otp" id="sendOtpBtn" onclick="sendOtp()">📨 Send OTP</button>
    </div>

    <!-- SUCCESS -->
    <div class="success-card" id="successCard">
      <div class="success-icon">🎉</div>
      <h2 style="font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:8px;">Welcome back!</h2>
      <p style="color:rgba(245,245,245,0.45);font-size:0.83rem;margin-bottom:4px;">Redirecting to your dashboard...</p>

    </div>

    <style>
      @keyframes loadBar {
        from { width:0; opacity:0.4; }
        to { width:100%; opacity:1; }
      }
    </style>

    <div class="card-foot">
      New to StudyVerse? <a href="#">Create free account</a>
    </div>
  </div>

// ── RAIN ──
(function() {
  const rain = document.getElementById('rain');
  for (let i = 0; i < 55; i++) {
    const d = document.createElement('div');
    d.className = 'drop';
    const h = 40 + Math.random() * 80;
    d.style.cssText = `
      left: ${Math.random() * 110}%;
      height: ${h}px;
      opacity: ${0.03 + Math.random() * 0.07};
      animation-duration: ${0.6 + Math.random() * 0.9}s;
      animation-delay: ${-Math.random() * 2}s;
    `;
    rain.appendChild(d);
  }
})();

// ── TABS ──
function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
  document.getElementById('tab' + (t === 'email' ? 'Email' : 'Phone')).classList.add('active');
  document.getElementById('form' + (t === 'email' ? 'Email' : 'Phone')).classList.add('active');
}

// ── TOAST ──
function toast(icon, msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span class="toast-i">${icon}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// ── EMAIL LOGIN ──
function loginEmail() {
  const email = document.getElementById('emailInp').value.trim();
  const pass = document.getElementById('passInp').value;
  if (!email || !email.includes('@gmail.com')) { toast('⚠️', 'Enter a valid Gmail address'); return; }
  if (!pass || pass.length < 6) { toast('🔒', 'Password must be at least 6 characters'); return; }
  const btn = event.currentTarget;
  btn.innerHTML = '<span class="spinner"></span> Signing in...';
  btn.classList.add('btn-loading');
  setTimeout(() => { showSuccess(); }, 1800);
}

// ── GOOGLE LOGIN ──
function loginGoogle() {
  toast('🔍', 'Redirecting to Google sign-in...');
}

// ── PHONE: SEND OTP ──
let otpSent = false;
let timerInt;
function sendOtp() {
  const phone = document.getElementById('phoneInp').value.trim();
  if (phone.length < 10) { toast('⚠️', 'Enter a valid 10-digit number'); return; }
  const dial = document.getElementById('dialCode').value;
  const btn = document.getElementById('sendOtpBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Sending...';
  setTimeout(() => {
    document.getElementById('otpTarget').textContent = dial + ' ' + phone;
    document.getElementById('otpSection').style.display = 'block';
    document.getElementById('sendOtpBtn').style.display = 'none';
    document.querySelectorAll('.otp-input')[0].focus();
    toast('📩', 'OTP sent! Check your messages.');
    startResendTimer();
  }, 1200);
}

function startResendTimer() {
  let secs = 30;
  document.getElementById('resendTimer').textContent = secs;
  document.getElementById('resendLink').style.pointerEvents = 'none';
  timerInt = setInterval(() => {
    secs--;
    if (secs <= 0) {
      clearInterval(timerInt);
      document.getElementById('resendLink').innerHTML = 'Resend OTP';
      document.getElementById('resendLink').style.pointerEvents = '';
    } else {
      document.getElementById('resendTimer').textContent = secs;
    }
  }, 1000);
}

function resendOtp() {
  event.preventDefault();
  toast('📨', 'OTP resent!');
  document.getElementById('resendLink').innerHTML = 'Resend in <span id="resendTimer">30</span>s';
  startResendTimer();
}

// ── OTP BOXES ──
function otpNext(el, idx) {
  el.value = el.value.replace(/\D/g, '');
  const boxes = document.querySelectorAll('.otp-input');
  if (el.value && idx < 5) boxes[idx + 1].focus();
  if (idx === 5 && el.value) {
    const otp = Array.from(boxes).map(b => b.value).join('');
    if (otp.length === 6) toast('✅', 'OTP complete! Tap verify.');
  }
}

// ── VERIFY OTP ──
function verifyOtp() {
  const boxes = document.querySelectorAll('.otp-input');
  const otp = Array.from(boxes).map(b => b.value).join('');
  if (otp.length < 6) { toast('⚠️', 'Enter all 6 OTP digits'); return; }
  const btn = event.currentTarget;
  btn.innerHTML = '<span class="spinner"></span> Verifying...';
  btn.classList.add('btn-loading');
  setTimeout(() => showSuccess(), 1600);
}

// ── SUCCESS ──
function showSuccess() {
  document.querySelector('.card').innerHTML = `
    <div style="text-align:center;padding:20px 0">
      <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#f05454,#c83030);display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 22px;box-shadow:0 0 16px rgba(240,84,84,0.18);animation:popIn 0.5s cubic-bezier(0.22,1,0.36,1);">🎓</div>
      <h2 style="font-family:'Playfair Display',serif;font-size:1.6rem;margin-bottom:10px;">You're in!</h2>
      <p style="color:rgba(245,245,245,0.42);font-size:0.84rem;line-height:1.6;">Welcome back to StudyVerse.<br>Your 18-day streak is safe. Let's crush today! 🔥</p>
      <div style="margin-top:24px;width:100%;height:3px;border-radius:4px;background:rgba(255,255,255,0.06);overflow:hidden;">
        <div style="height:100%;background:linear-gradient(90deg,#f05454,#c83030);border-radius:4px;animation:loadBar 2.5s ease-in-out forwards;"></div>
      </div>
      <p style="margin-top:10px;font-size:0.7rem;color:rgba(245,245,245,0.2);font-family:'DM Mono',monospace;">Redirecting to dashboard...</p>
    </div>
  `;
  toast('🌸', 'Welcome back! 18-day streak intact!');
}
</script>
